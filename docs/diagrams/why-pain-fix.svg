      <g transform="translate(48,234)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,280)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,326)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,372)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,418)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,464)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,510)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,556)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
      <g transform="translate(48,602)"><line x1="0" y1="0" x2="8" y2="8"/><line x1="8" y1="0" x2="0" y2="8"/></g>
    </g>
    <!-- fix markers -->
    <g stroke="#7ee787" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(632,187)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,233)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,279)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,325)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,371)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,417)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,463)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,509)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,555)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
      <g transform="translate(632,601)"><path d="M 0,6 L 4,10 L 11.5,1.5"/></g>
    </g>

    <!-- pain column -->
    <g fill="#c9d1d9">
      <text x="72" y="197">Subscription quota expires unused every month</text>
      <text x="72" y="243">Rate limits stop you mid-coding</text>
      <text x="72" y="289">Tool outputs (git diff, grep, logs) burn tokens</text>
      <text x="72" y="335">Expensive APIs — $20–50/mo per provider</text>
      <text x="72" y="381">Each AI tool wants its own setup</text>
      <text x="72" y="427">AI blocked in your country</text>
      <text x="72" y="473">Dead keys and banned accounts kill your flow</text>
      <text x="72" y="519">One subscription, a whole team fighting over it</text>
      <text x="72" y="565">Your prompts routed through someone else's cloud</text>
      <text x="72" y="611">No idea where tokens and money go</text>
    </g>

    <!-- fix column -->
    <g fill="#a1a1aa">
      <text x="660" y="197"><tspan font-weight="700" fill="#7ee787">Maximize subscriptions</tspan> — track quota, use every token before reset</text>
      <text x="660" y="243"><tspan font-weight="700" fill="#7ee787">4-tier auto-fallback</tspan> — Subscription → API → Cheap → Free, in ms</text>
      <text x="660" y="289"><tspan font-weight="700" fill="#7ee787">RTK + Caveman compression</tspan> — save 15–95% eligible tokens</text>
      <text x="660" y="335"><tspan font-weight="700" fill="#7ee787">Cost-optimized routing</tspan> — auto-route to the cheapest viable model</text>
      <text x="660" y="381"><tspan font-weight="700" fill="#7ee787">One endpoint</tspan> — every tool, one config, one dashboard</text>
      <text x="660" y="427"><tspan font-weight="700" fill="#7ee787">3-level proxy + TLS stealth</tspan> — use AI from anywhere</text>
      <text x="660" y="473"><tspan font-weight="700" fill="#7ee787">3-layer resilience</tspan> — circuit breakers, key cooldown, model lockout</text>
      <text x="660" y="519"><tspan font-weight="700" fill="#7ee787">Key pools</tspan> — fair-share quotas per member, hot-path enforced</text>
      <text x="660" y="565"><tspan font-weight="700" fill="#7ee787">Local-first</tspan> — your machine, keys encrypted (AES-256-GCM)</text>
      <text x="660" y="611"><tspan font-weight="700" fill="#7ee787">Live analytics</tspan> — usage, quota, savings &amp; p95 latency per provider</text>
