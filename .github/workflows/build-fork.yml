name: Publish Fork Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to publish"
        required: true
        type: string
        default: "3.8.47"

# Least-privilege default: read-only at the top level; the build job that pushes to
# GHCR grants packages: write itself (Scorecard TokenPermissions).
permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/xz-dev/omniroute

jobs:
  build:
    name: Build and Push Fork Image
    if: github.repository == 'xz-dev/OmniRoute'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
            ${{ env.IMAGE_NAME }}:release-v${{ inputs.image_tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=omniroute
            org.opencontainers.image.description=Unified AI proxy/router — xz-dev fork image
            org.opencontainers.image.url=https://github.com/xz-dev/OmniRoute
            org.opencontainers.image.source=https://github.com/xz-dev/OmniRoute
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.image_tag }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
